       Shapes mirror src/components/brand/nidlo-mark.tsx so this asset and
       the in-app NidloMark stay visually consistent (Q-11). The mark's
       48x48 coordinate space is centered and scaled inside the 192 tile. -->
  <rect width="192" height="192" rx="42" fill="#1a1612"/>
  <g transform="translate(48 48) scale(2)">
    <path d="M 4 30 C 8 18, 18 14, 28 22 C 34 27, 38 30, 42 30"
