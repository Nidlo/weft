          stroke="#fbf7f0" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 40 14 L 44 10 L 42 16 Z" fill="#fbf7f0"/>
    <ellipse cx="15.5" cy="36.5" rx="2.4" ry="1.2"
